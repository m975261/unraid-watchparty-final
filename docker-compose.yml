services:
  watchparty-final:
    image: muaeabudhabi/watchparty-final:latest
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
      org.titan.app: watchparty-final
    environment:
    - NODE_ENV=production
    - LOG_LEVEL=info
    - PUID=99
    - PGID=100
    - UMASK=022
    - DATABASE_URL=postgresql://watchparty-final:changeme@watchparty-final_postgres:5432/watchparty-final
    - REDIS_URL=redis://watchparty-final_redis:6379
    volumes:
    - /mnt/user/appdata/watchparty-final/data:/data
    - /mnt/user/appdata/watchparty-final/config:/config
    logging:
      driver: json-file
      options: &id001
        max-size: 10m
        max-file: '3'
    ports:
    - 3100:3100
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://localhost:3100/health || curl -sf http://localhost:3100/healthz
        || curl -sf http://localhost:3100/ || exit 1
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
    - watchparty-final_net
    depends_on:
      watchparty-final_postgres:
        condition: service_healthy
      watchparty-final_redis:
        condition: service_healthy
  watchparty-final_postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
    - POSTGRES_DB=watchparty-final
    - POSTGRES_USER=watchparty-final
    - POSTGRES_PASSWORD=changeme
    volumes:
    - watchparty-final_postgres_data:/var/lib/postgresql/data
    networks:
    - watchparty-final_net
    logging:
      driver: json-file
      options: *id001
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER:-app}
      interval: 30s
      timeout: 5s
      retries: 5
  watchparty-final_redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment: []
    volumes:
    - watchparty-final_redis_data:/data
    networks:
    - watchparty-final_net
    logging:
      driver: json-file
      options: *id001
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 30s
      timeout: 5s
      retries: 5
networks:
  watchparty-final_net:
    driver: bridge
volumes:
  watchparty-final_data:
    driver: local
  watchparty-final_postgres_data:
    driver: local
  watchparty-final_redis_data:
    driver: local
